name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  discover:
    name: Discover recipes
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.set.outputs.recipes }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - id: set
        run: |
          recipes=$(for d in recipes/*/; do
            [ -f "${d}recipe.yaml" ] && basename "$d"
          done | jq -R -s -c 'split("\n")[:-1]')
          echo "recipes=$recipes" >> "$GITHUB_OUTPUT"
          echo "Found recipes: $recipes"

  build:
    name: Build ${{ matrix.recipe }} (${{ matrix.target-platform }})
    needs: discover
    if: needs.discover.outputs.recipes != '[]'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.discover.outputs.recipes) }}
        target-platform: [linux-64, osx-arm64]
        include:
          - target-platform: linux-64
            os: ubuntu-latest
          - target-platform: osx-arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.36
        with:
          recipe-path: recipes/${{ matrix.recipe }}/recipe.yaml
          artifact-name: ${{ matrix.recipe }}-${{ matrix.target-platform }}
          build-args: >-
            -m conda_build_config.yaml
            --target-platform ${{ matrix.target-platform }}

  upload:
    name: Upload to prefix.dev
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: output
      - name: Setup rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.36
        with:
          setup-only: true
      - name: Upload packages
        run: |
          for pkg in $(find output -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c black-desk --skip-existing "${pkg}"
          done
